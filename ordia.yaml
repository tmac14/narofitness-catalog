# Ordia manifest — Narofitness catalog (Ordia consumer, not an Ordia monorepo)
# Spec: docs/ordia/SPEC_v0.8.md · Manifest schema v0.3 (commands.profileDoc)

version: "0.3"
profile: narofitness

control:
  root: docs/control
  state: ORCHESTRATION_STATE.md
  taskRegistry: TASK_REGISTRY.yaml
  agentRegistry: AGENT_REGISTRY.yaml
  decisionLog: DECISION_LOG.md
  evidenceIndex: EVIDENCE_INDEX.md
  taskPackets: tasks
  projectProfile: PROFILE.md

session:
  runtimes:
    - ONLY_CODEX
    - CODEX_PLUS_CURSOR
    - ONLY_CURSOR
  protocols:
    - ORCHESTRATION
    - IMPLEMENTATION
  modes:
    - MULTI_CHAT
    - UNIFIED

enforcement:
  productRoots:
    - apps/
  controlRoots:
    - docs/control/
    - docs/ordia/
    - .cursor/rules/
    - .cursor/hooks/
    - AGENTS.md
    - ordia.yaml
  qaEvidenceRoots:
    - temp/qa/
  orchestrationBlocksProduct: true
  unifiedRequiresApproval: true

closure:
  validator: npm run control:validate

commands:
  catalog: commands.catalog.json
  profileDoc: COMMANDS.md
  npmPackage: package.json
  validateOnControlCheck: true

models:
  registry: docs/control/MODEL_REGISTRY.yaml
  telemetryRoot: temp/qa/model-usage
  defaultTier: T1
  requireApprovalAbove: T1

workflows:
  overlay: docs/control/workflows/intents.narofitness.yaml
