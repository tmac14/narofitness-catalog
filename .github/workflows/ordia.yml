name: ordia

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ordia-control-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ordia
        run: pip install ordia-core==0.18.0
      - name: Doctor
        run: ordia doctor
      - name: Validate project
        run: ordia validate --project
      - name: Task summary
        run: ordia task summary --json
