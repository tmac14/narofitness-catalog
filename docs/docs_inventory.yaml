# Documentation inventory rules
rules:
  - pattern: "docs/archive/**"
    lifecycle: ARCHIVED
    language: English
    category: archive
  - pattern: "docs/product/**"
    lifecycle: CORE
    language: English
    category: product
  - pattern: "docs/product/planning/**"
    lifecycle: ACTIVE
    language: English
    category: planning
  - pattern: "docs/design/**"
    lifecycle: ACTIVE
    language: English
    category: design
  - pattern: "docs/qa/**"
    lifecycle: ACTIVE
    language: English
    category: qa
  - pattern: "docs/API.md"
    lifecycle: CORE
    language: English
    category: api
  - pattern: "docs/ENGINEERING_STANDARDS.md"
    lifecycle: CORE
    language: English
    category: standards
  - pattern: "COMMANDS.md"
    lifecycle: CORE
    language: Spanish
    category: commands
