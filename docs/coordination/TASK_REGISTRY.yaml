  agent_registry: "docs/coordination/AGENT_REGISTRY.yaml"
  task_history: "docs/coordination/TASK_HISTORY.md"

allowed_statuses:
  - DISCOVERY
  - PLAN_READY
  - WAITING_FOR_USER_DECISION
  - WAITING_FOR_AGENT_REPORT
  - APPROVED
  - LOCKS_PENDING
  - LOCKS_CONFIRMED
  - MODEL_TIER_APPROVED
  - READY_FOR_IMPLEMENTATION
  - IN_FLIGHT
  - IMPLEMENTED
  - VALIDATION_PENDING
  - VALIDATED
  - BLOCKED
  - PAUSED
  - CLOSED

parallelization:
  default: "DENY_UNTIL_PROVEN_SAFE"
  required_checks:
    - dependencies_validated
    - decisions_resolved
    - write_paths_known
    - no_lock_conflict
    - no_shared_unstable_contract
    - no_same_agent_dependency
    - validation_owner_available
  active_parallel_groups: []

agent_pool:
  registry_source: "docs/coordination/AGENT_REGISTRY.yaml"
  assignment_rule: "VERIFY_AVAILABILITY_SCOPE_AND_TOPOLOGY_BEFORE_ASSIGNMENT"
  current_assignments: {}

