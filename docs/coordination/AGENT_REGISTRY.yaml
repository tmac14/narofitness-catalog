schema_version: 1
updated_at: "2026-06-13"
authority:
  purpose: "Authoritative agent capability, ownership, and topology registry."
  topology_protocol: "docs/coordination/AGENT_TOPOLOGY_PROTOCOL.md"
  topology_review: "docs/coordination/AGENT_TOPOLOGY_REVIEW.md"

orchestrator:
  id: "Codex"
  role: "Primary control-plane orchestrator"
  cursor_agent: false

operational_identity_count: 7
count_discrepancy:
  detected: false
  resolution: "Seven Cursor operational identities are canonical. Codex is not counted as a Cursor agent."
  decision: "AGENT-D001"

identity_rules:
  - "Assign work by registered operational identity and capability."
  - "Capability profiles are prompt scopes, not additional operational identities."
  - "One operational identity may hold only one in-flight assignment unless a future topology decision explicitly allows otherwise."
  - "No permanent split, merge, creation, retirement, or scope change without an approved topology decision."

ownership_boundaries:
  catalogue_builder:
    owner: "Agent 1A"
    paths:
      - "apps/desktop/src/pages/CatalogsPage.tsx"
      - "apps/desktop/src/pages/CatalogEditorPage.tsx"
      - "apps/desktop/src/components/catalog-builder/**"
    includes:
      - "catalogue preview workspace and export-dialog UI"
      - "catalogue-specific tests and visual QA"
  app_wide_frontend:
    owner: "Agent 1B"
    paths:
      - "app shell and non-catalogue pages"
      - "apps/desktop/src/components/responsive/**"
      - "apps/desktop/src/lib/responsive/**"
    includes:
      - "responsive behavior and accessibility"
  frontend_contracts:
    owner: "Agent 4"
    paths:
      - "apps/desktop/src/lib/api.ts"
      - "frontend API response types and contract hooks"
    requires: "confirmed backend contract"
  shared_frontend:
    lock_policy: "Exact per-file task lock required before edits."
    paths:
      - "apps/desktop/src/components/ui/**"
      - "apps/desktop/src/App.tsx"
      - "apps/desktop/src/components/Layout.tsx"
      - "apps/desktop/src/components/TitleBar.tsx"
      - "apps/desktop/src/index.css"
  backend:
    owner: "Agent 2"
    paths:
      - "apps/api/**"
    rule: "Use Agent 2A or Agent 2B profile scope; profiles are non-concurrent."
  pdf_renderer:
    owner: "Agent 6"
    paths:
      - "PDF export pipeline, templates, print renderer, and renderer tests"
    blocked:
      - "general frontend without handoff"
      - "importer/parser"

agents:
  - id: "Agent 1A"
    role: "Catalogue Builder UI/UX"
    disposition: "RETAIN"
    mode: "PERMANENT"
    owns:
      - "catalogue builder UI"
      - "catalogue-specific visual QA"
      - "PreviewWorkspace and catalogue export UI"
    blocked:
      - "backend/importer"
      - "app-wide UI without handoff"

  - id: "Agent 1B"
    role: "App-Wide Accessible UX/UI"
    disposition: "RETAIN"
    mode: "PERMANENT"
    owns:
      - "app shell and non-catalogue frontend"
      - "responsive and accessibility"
    blocked:
      - "catalogue builder without handoff"
      - "backend and API contracts"

  - id: "Agent 2"
    role: "Backend/API/Importer/PIM"
    disposition: "RETAIN_WITH_CAPABILITY_PROFILE_TRIAL"
    mode: "PERMANENT"
    capability_profiles:
      - id: "Agent 2A"
        role: "Backend/API/Data Platform"
        status: "TRIAL"
        owns:
          - "schema and approved migrations"
          - "backend models, persistence, queries, and transactions"
          - "API endpoints and contracts"
          - "backend platform and contract tests"
        blocked:
          - "frontend"
          - "importer/parser/grouping implementation unless explicitly included by dependency"
      - id: "Agent 2B"
        role: "Import/PIM Intelligence"
        status: "TRIAL"
        owns:
          - "importer and parser"
          - "grouping, taxonomy mapping, and spec extraction"
          - "import/PIM seed rules and related backend tests"
        blocked:
          - "frontend"
          - "schema/migrations or general API work without an approved dependency"
    profile_trial:
      decision: "AGENT-D003"
      permanent_split: false
      concurrent_assignments_allowed: false
      assignment_slot: "Agent 2"
      review_after: "Three completed profile-scoped assignments or the next major project phase, whichever comes first."
    owns:
      - "apps/api/**"
      - "schema and migrations with approval"
      - "importer, parser, grouping, taxonomy, specs"
    blocked:
      - "frontend"
      - "coordination docs"

  - id: "Agent 3"
    role: "Governance and Architecture Audit"
    disposition: "RETAIN_ON_DEMAND"
    mode: "ON_DEMAND"
    owns:
      - "governance audits"
      - "architecture boundary review"
      - "contract consistency review"
      - "documentation lifecycle review"
      - "control-system health audit"
    blocked:
      - "production code"
      - "routine control-state ownership"
      - "routine lock, queue, dependency, or next-action maintenance"

  - id: "Agent 4"
    role: "Frontend Contract Integration"
    disposition: "RETAIN"
    mode: "ON_DEMAND"
    owns:
      - "api.ts, frontend contract types, hooks, and integration tests"
    blocked:
      - "inventing backend contracts"
      - "design-heavy frontend work"

  - id: "Agent 5"
    role: "FDL Import Audit"
    disposition: "RETAIN"
    mode: "PERMANENT"
    owns:
      - "read-only import audits and evidence"
    blocked:
      - "production implementation"

  - id: "Agent 6"
    role: "PDF Export and Print Renderer"
    disposition: "RETAIN"
    mode: "PERMANENT"
    owns:
      - "PDF export pipeline, templates, print renderer, parity QA"
    blocked:
      - "importer/parser"
      - "general frontend without handoff"

proposal_policy:
  user_approval_required: true
  decision: "AGENT-D001/AGENT-D002/AGENT-D003"
  next_scheduled_review: "After three Agent 2 profile-scoped assignments or the next major project phase."
  review_triggers:
    - "persistent queue pressure"
    - "recurring collisions"
    - "missing independent validator"
    - "new specialist domain"
    - "over-broad or underused role"
