schema_version: 1
updated_at: "2026-06-14"
authority:
  purpose: "Narofitness agent capability and topology — API, desktop, data, infra, QA, docs."

operational_identity_count: 6

control_plane_runtimes:
  - id: "Cursor Control Plane"
    role: "Cursor control-plane orchestrator"
    cursor_agent: true
    multi_chat: true
    protocols:
      - "docs/control/protocols/CURSOR_ORCHESTRATION.md"
      - "docs/control/protocols/CURSOR_IMPLEMENTATION.md"
      - "docs/control/protocols/TASK_EXECUTION.md"
      - "docs/control/protocols/RECOVERY_RUNBOOK.md"
      - "docs/control/protocols/RUNTIME_HANDOFF.md"
  - id: "Codex Control Plane"
    role: "Codex orchestrator (ONLY_CODEX / CODEX_PLUS_CURSOR)"
    cursor_agent: false
    multi_chat: false
    protocols:
      - "docs/control/protocols/CODEX_ORCHESTRATION.md"
      - "docs/control/protocols/CODEX_IMPLEMENTATION.md"
      - "docs/control/protocols/TASK_EXECUTION.md"
      - "docs/control/protocols/RECOVERY_RUNBOOK.md"
      - "docs/control/protocols/RUNTIME_HANDOFF.md"

agents:
  - id: agent-backend
    role: "FastAPI API and domain services"
    scopes: ["apps/api/"]
    max_in_flight: 1
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
  - id: agent-frontend
    role: "Electron + Vite desktop UI"
    scopes: ["apps/desktop/"]
    max_in_flight: 1
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
  - id: agent-data
    role: "Alembic migrations, seeds, import data layer"
    scopes: ["apps/api/alembic/", "apps/api/scripts/", "apps/api/app/db/"]
    max_in_flight: 1
    excludes: infra-data
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
  - id: agent-infra
    role: "Docker, CI, packaging, tunnels, dev automation"
    scopes: ["docker-compose.yml", "docker-compose.dev.yml", ".github/", "packaging/", "scripts/"]
    max_in_flight: 1
    excludes: infra-data
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
  - id: agent-qa
    role: "QA evidence and read-only validation"
    scopes: ["temp/qa/"]
    max_in_flight: 2
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
  - id: agent-docs
    role: "Documentation and control-plane prose"
    scopes: ["docs/", "docs/control/"]
    max_in_flight: 1
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
